syntax = "proto3";
package hotmint.abci;
option go_package = "github.com/rust-util-collections/hotmint/sdk/go/proto/abci";

// ---- Primitive wrappers (flattened to scalars in message fields) ----

message Block {
  uint64 height = 1;
  bytes parent_hash = 2;      // 32 bytes
  uint64 view = 3;
  uint64 proposer = 4;
  uint64 timestamp = 8;        // unix millis, set by proposer
  bytes payload = 5;
  bytes hash = 6;             // 32 bytes
  bytes app_hash = 7;         // 32 bytes, state root after executing parent block
  repeated EquivocationProof evidence = 9;
}

message TxContext {
  uint64 height = 1;
  uint64 epoch = 2;
}

message ValidatorInfo {
  uint64 id = 1;
  bytes public_key = 2;
  uint64 power = 3;
}

message ValidatorSet {
  repeated ValidatorInfo validators = 1;
  uint64 total_power = 2;
}

message VoteExtension {
  uint64 validator_id = 1;
  bytes data = 2;
}

message BlockContext {
  uint64 height = 1;
  uint64 view = 2;
  uint64 proposer = 3;
  uint64 epoch = 4;
  uint64 epoch_start_view = 5;
  ValidatorSet validator_set = 6;
  repeated VoteExtension vote_extensions = 7;
  uint64 timestamp = 8;
}

message EquivocationProof {
  uint64 validator = 1;
  uint64 view = 2;
  uint32 vote_type = 3;       // 0 = Vote, 1 = Vote2
  bytes block_hash_a = 4;
  bytes signature_a = 5;
  bytes block_hash_b = 6;
  bytes signature_b = 7;
  uint64 epoch = 8;
  bytes extension_a = 9;
  bytes extension_b = 10;
  bool has_extension_a = 11;
  bool has_extension_b = 12;
}

message ValidatorUpdate {
  uint64 id = 1;
  bytes public_key = 2;
  uint64 power = 3;
}

message EventAttribute {
  string key = 1;
  string value = 2;
}

message Event {
  string type = 1;
  repeated EventAttribute attributes = 2;
}

message EndBlockResponse {
  repeated ValidatorUpdate validator_updates = 1;
  repeated Event events = 2;
  bytes app_hash = 3;         // 32 bytes, application state root after execution
}

// ---- Request ----

message Request {
  oneof request {
    BlockContext create_payload = 1;
    ValidateBlockRequest validate_block = 2;
    ValidateTxRequest validate_tx = 3;
    ExecuteBlockRequest execute_block = 4;
    OnCommitRequest on_commit = 5;
    EquivocationProof on_evidence = 6;
    QueryRequest query = 7;
    InfoRequest info = 8;
    InitChainRequest init_chain = 9;
    OnOfflineValidatorsRequest on_offline_validators = 10;
    ExtendVoteRequest extend_vote = 11;
    VerifyVoteExtensionRequest verify_vote_extension = 12;
    ListSnapshotsRequest list_snapshots = 13;
    LoadSnapshotChunkRequest load_snapshot_chunk = 14;
    OfferSnapshotRequest offer_snapshot = 15;
    ApplySnapshotChunkRequest apply_snapshot_chunk = 16;
    TracksAppHashRequest tracks_app_hash = 17;
  }
}

message InfoRequest {}

message InitChainRequest {
  bytes app_state = 1;
}

message ValidateBlockRequest {
  Block block = 1;
  BlockContext ctx = 2;
}

message ValidateTxRequest {
  bytes tx = 1;
  TxContext ctx = 2;
}

message ExecuteBlockRequest {
  repeated bytes txs = 1;
  BlockContext ctx = 2;
}

message OnCommitRequest {
  Block block = 1;
  BlockContext ctx = 2;
}

message QueryRequest {
  string path = 1;
  bytes data = 2;
}

message OfflineEvidence {
  uint64 validator = 1;
  uint64 missed_commits = 2;
  uint64 total_commits = 3;
  uint64 evidence_height = 4;
}

message OnOfflineValidatorsRequest {
  repeated OfflineEvidence offline = 1;
}

message ExtendVoteRequest {
  Block block = 1;
  BlockContext ctx = 2;
}

message VerifyVoteExtensionRequest {
  bytes extension = 1;
  bytes block_hash = 2;
  uint64 validator = 3;
}

message SnapshotInfo {
  uint64 height = 1;
  uint32 chunks = 2;
  bytes hash = 3;
}

message ListSnapshotsRequest {}

message LoadSnapshotChunkRequest {
  uint64 height = 1;
  uint32 chunk_index = 2;
}

message OfferSnapshotRequest {
  SnapshotInfo snapshot = 1;
}

message ApplySnapshotChunkRequest {
  bytes chunk = 1;
  uint32 chunk_index = 2;
}

message TracksAppHashRequest {}

// ---- Response ----

message Response {
  oneof response {
    CreatePayloadResponse create_payload = 1;
    ValidateBlockResponse validate_block = 2;
    ValidateTxResponse validate_tx = 3;
    ExecuteBlockResponse execute_block = 4;
    OnCommitResponse on_commit = 5;
    OnEvidenceResponse on_evidence = 6;
    QueryResponse query = 7;
    InfoResponse info = 8;
    InitChainResponse init_chain = 9;
    OnOfflineValidatorsResponse on_offline_validators = 10;
    ExtendVoteResponse extend_vote = 11;
    VerifyVoteExtensionResponse verify_vote_extension = 12;
    ListSnapshotsResponse list_snapshots = 13;
    LoadSnapshotChunkResponse load_snapshot_chunk = 14;
    OfferSnapshotResponse offer_snapshot = 15;
    ApplySnapshotChunkResponse apply_snapshot_chunk = 16;
    TracksAppHashResponse tracks_app_hash = 17;
  }
}

message AppInfo {
  uint64 last_block_height = 1;
  bytes last_block_app_hash = 2;
}

message InfoResponse {
  AppInfo info = 1;
}

message InitChainResponse {
  bytes app_hash = 1;
  string error = 2;
}

message CreatePayloadResponse {
  bytes payload = 1;
}

message ValidateBlockResponse {
  bool ok = 1;
}

message ValidateTxResponse {
  bool ok = 1;
  uint64 priority = 2;
  uint64 gas_wanted = 3;
}

message ExecuteBlockResponse {
  EndBlockResponse result = 1;
  string error = 2;
}

message OnCommitResponse {
  string error = 1;
}

message OnEvidenceResponse {
  string error = 1;
}

message OnOfflineValidatorsResponse {
  string error = 1;
}

message ExtendVoteResponse {
  bytes extension = 1;
  bool has_extension = 2;
}

message VerifyVoteExtensionResponse {
  bool ok = 1;
}

message QueryResponse {
  bytes data = 1;
  string error = 2;
  bytes proof = 3;
  uint64 height = 4;
}

message ListSnapshotsResponse {
  repeated SnapshotInfo snapshots = 1;
}

message LoadSnapshotChunkResponse {
  bytes data = 1;
}

message OfferSnapshotResponse {
  uint32 result = 1;
}

message ApplySnapshotChunkResponse {
  uint32 result = 1;
}

message TracksAppHashResponse {
  bool tracks = 1;
}
